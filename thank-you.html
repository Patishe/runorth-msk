    <style>
        .thankyou-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-dark);
            padding: 40px 20px;
        }

        .thankyou-card {
            max-width: 600px;
            width: 100%;
            background: var(--bg-card);
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .thankyou-icon {
            width: 90px;
            height: 90px;
            background: var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            animation: scaleIn 0.5s ease-out 0.2s both;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
            }

            to {
                transform: scale(1);
            }
        }

        .thankyou-icon svg {
            width: 45px;
            height: 45px;
            stroke: #fff;
            stroke-width: 3;
            fill: none;
        }

        .thankyou-card h1 {
            color: var(--text-dark);
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 16px;
        }

        .thankyou-card p {
            color: #555;
            font-family: var(--font-body);
            font-size: 1.1rem;
            line-height: 1.6;
            margin: 0 0 30px;
        }

        .thankyou-links {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .thankyou-links a {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 0.95rem;
            padding: 8px 16px;
            border: 1px solid rgba(232, 167, 116, 0.3);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .thankyou-links a:hover {
            background: var(--accent-color);
            color: var(--text-dark);
            border-color: var(--accent-color);
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background: var(--accent-color);
            color: #fff;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 1rem;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn-back:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(232, 167, 116, 0.4);
        }

        .btn-back svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        @media (max-width: 600px) {
            .thankyou-card {
                padding: 40px 24px;
            }

            .thankyou-card h1 {
                font-size: 1.5rem;
            }

            .thankyou-card p {
                font-size: 1rem;
            }
        }
    </style>
